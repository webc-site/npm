[package]
name = "xboot_demo"
version = "0.1.0"
edition = "2024"
categories = [
  "development-tools::testing",
  "development-tools",
  "asynchronous",
  "concurrency",
  "rust-patterns"
]

[package.metadata.cargo-machete]
ignored = ["linkme"]

[dependencies]
linkme = "0.3.36"
log = "0.4.32"

[dependencies.log_init]
version = "0.1.36"
path = "../../log_init"

[dependencies.xboot]
path = ".."
version = "0.1.38"

[dependencies.aok]
version = "0.1.18"

[dependencies.tokio]
version = "1.52.3"
features = ["macros", "rt", "rt-multi-thread", "time"]
