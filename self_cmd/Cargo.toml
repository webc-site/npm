[package]
name = "self_cmd"
version = "0.1.11"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/self_cmd"
description = "Self-executing command builder for Rust programs / Rust 程序自执行命令构建器"
keywords = ["command", "process", "self-execution", "spawn", "restart"]
categories = ["command-line-interface", "development-tools", "os", "asynchronous", "concurrency"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []

[dev-dependencies]
aok = "0.1.18"
log = "0.4.33"
log_init = "0.1.38"
static_init = { version = "1.0.4", features = ["parking_lot"] }

[dev-dependencies.tokio]
version = "1.52.3"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]

[target.'cfg(target_os = "linux")'.dependencies]
command-fds = "0.3.3"
libc = "0.2"

[dependencies]
log = "0.4.33"
thiserror = "2.0.18"
