[package]
name = "smtp_recv"
version = "0.1.69"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/smtp_recv"
description = "Dual-port SMTP server: Secure submission (465) & Inbound forwarding (25) / 双端口 SMTP 服务：安全提交 (465) 与入站转发 (25)"
exclude = ["conf"]
keywords = ["smtp", "server", "tls", "forwarding", "email"]
categories = ["email", "network-programming", "asynchronous", "cryptography", "development-tools"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = ["send", "forward"]
send = ["dep:auth_trait"]
forward = ["dep:mail_forward"]
kill_port = ["socket_port/kill_port"]

[dependencies]
anyhow = "1.0.103"
aok = "0.1.18"
base64 = "0.22.1"
drop = "0.1.4"
email_address = "0.2.9"
log = "0.4.33"
thiserror = "2.0.18"
tokio-rustls = "0.26.4"
tokio-util = "0.7.18"
xboot = "0.1.39"

[dependencies.xmail]
version = "0.1.17"
path = "../xmail"

[dependencies.idns]
version = "0.2.16"
path = "../idns"
features = ["cache", "spf"]

[dependencies.idot]
version = "0.1.3"
path = "../idot"
features = ["static"]

[dependencies.auth_trait]
version = "0.1.8"
path = "../auth_trait"
optional = true

[dependencies.mail_forward]
version = "0.1.10"
path = "../mail_forward"
optional = true

[dependencies.graceful_restart]
version = "0.1.8"
path = "../graceful_restart"

[dependencies.sys_notify]
version = "0.1.6"
path = "../sys_notify"

[dependencies.socket_port]
version = "0.1.32"
path = "../socket_port"

[dependencies.mail_struct]
version = "0.1.23"
path = "../mail_struct"

[dependencies.ssl_trait]
version = "0.1.4"
path = "../ssl_trait"

[dependencies.rustls]
version = "0.23.41"
features = ["ring"]

[dependencies.tokio]
version = "1.52.3"
features = ["macros", "rt", "rt-multi-thread", "time", "sync", "full"]

[dev-dependencies]
mail-parser = "0.11.4"
aok = "0.1.18"
log_init = "0.1.38"
serde_yaml_bw = "2.5.6"
webpki-roots = "1.0.8"
rustls-pemfile = "2.2.0"

[dev-dependencies.static_init]
version = "1.0.4"
features = ["parking_lot"]

[dev-dependencies.cert_by_host]
path = "../cert_by_host"
version = "0.1.9"

[dev-dependencies.rapidhash]
version = "4"

[dev-dependencies.serde]
version = "1.0"
features = ["derive"]

[dev-dependencies.lettre]
version = "0.11.22"
features = ["tokio1", "rustls-tls", "builder", "tokio1-rustls-tls", "smtp-transport"]
default-features = false
