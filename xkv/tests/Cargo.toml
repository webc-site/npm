[package]
name = "xkv_demo"
version = "0.1.0"
edition = "2024"
categories = [
  "development-tools::testing",
  "database",
  "asynchronous",
  "concurrency",
  "development-tools"
]

[package.metadata.cargo-machete]
ignored = ["linkme"]

[dependencies]
linkme = "0.3.36"
log = "0.4"

[dependencies.xboot]
version = "0.1.39"
path = "../../xboot"

[dependencies.tokio]
version = "1.52.3"
features = ["macros", "rt", "rt-multi-thread", "time"]

[dependencies.xkv]
version = "0.1.59"
path = ".."
features = ["r"]

[dependencies.aok]
version = "0.1.18"
