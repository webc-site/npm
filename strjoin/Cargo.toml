[package]
name = "strjoin"
version = "0.1.1"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/strjoin"
description = "High-performance zero-allocation string join extension for Rust iterators / 针对 Rust 迭代器的高性能零临时分配字符串拼接扩展"
keywords = ["strjoin", "join", "iterator", "zero-allocation", "performance"]
categories = [
  "text-processing",
  "data-structures",
  "algorithms",
  "rust-patterns",
  "memory-management"
]
readme = "README.md"

[features]
default = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
thiserror = "2.0.18"

[dev-dependencies]
aok = "0.1.18"
log = "0.4.33"
log_init = "0.1.38"
static_init = "1.0.4"
