[package]
name = "sendptr"
version = "0.1.3"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/sendptr"
description = "Convenient cross-thread raw pointer usage / 方便跨线程用裸指针"
keywords = ["pointer", "send", "sync", "thread", "unsafe"]
categories = [
  "concurrency",
  "development-tools",
  "memory-management",
  "rust-patterns",
  "data-structures",
]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []

[dev-dependencies]
aok = "0.1.18"
log = "0.4.32"
log_init = "0.1.38"
static_init = { version = "1.0.4", features = ["parking_lot"] }

[dev-dependencies.tokio]
version = "1.52.3"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]
