[package]
name = "smtp_srv"
version = "0.2.35"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/smtp_srv"
description = "Auto-refreshing SMTPS server powered by Redis / Kvrocks / 基于 Redis / Kvrocks 自动热更新证书的 SMTPS 服务器"
keywords = ["smtp", "server", "redis", "kvrocks", "tls"]
categories = ["email", "network-programming", "asynchronous", "cryptography", "development-tools"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
kill_port = ["smtp_recv/kill_port"]

[dependencies]
aok = "0.1.18"
fred = "10.1.0"
genv = "0.1.18"
intbin = "0.2.4"
log = "0.4.33"
rustls = "0.23.41"
xbin = "0.1.14"
xboot = "0.1.39"
mail-send = "0.6.0"
rustls-pki-types = "1.15.0"

[dependencies.password_]
version = "0.1.2"
path = "../password_"

[dependencies.auth_trait]
version = "0.1.8"
path = "../auth_trait"

[dependencies.static_init]
version = "1.0.4"
features = ["parking_lot"]

[dependencies.mail_forward]
version = "0.1.10"
path = "../mail_forward"

[dependencies.xkv]
version = "0.1.59"
features = ["r"]
path = "../xkv"

[dependencies.xmail]
version = "0.1.17"
path = "../xmail"

[dependencies.graceful_restart]
version = "0.1.8"
path = "../graceful_restart"

[dependencies.log_init]
version = "0.1.38"
features = ["systemd"]

[dependencies.smtp_send]
version = "0.1.37"
path = "../smtp_send"

[dependencies.mimalloc]
version = "0.1.52"

[dependencies.mail_struct]
version = "0.1.23"
path = "../mail_struct"
features = ["encode"]

[dependencies.auth_env]
version = "0.1.5"
path = "../auth_env"

[dependencies.cert_by_host]
version = "0.1.9"
path = "../cert_by_host"

[dependencies.smtp_recv]
version = "0.1.69"
path = "../smtp_recv"

[dependencies.ssl_trait]
version = "0.1.4"
path = "../ssl_trait"

[dependencies.tokio]
version = "1.52.3"
features = ["rt-multi-thread"]

[dev-dependencies]
hex = "0.4.3"

[dev-dependencies.sk_dkim]
path = "../sk_dkim"
features = ["pk"]
version = "0.1.8"
