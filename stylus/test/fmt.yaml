- name: 基础
  code: |
    @import "../O/_.styl"
    @import url('//registry.npmmirror.com/18s/0.2.24/files/_.css')
    theme-color = #0071e3

    .box
      align-items center
      background HSL(220, 50%, 94%)
      border-radius 24px

      .card
        padding 24px
        margin 0 auto
  expected: |
    @import "../O/_.styl"
    @import url('//registry.npmmirror.com/18s/0.2.24/files/_.css')

    theme-color = #0071e3

    .box
      align-items center
      background HSL(220, 50%, 94%)
      border-radius 24px

      .card
        padding 24px
        margin 0 auto

- name: 注释
  code: |
    // single line comment
    /* multi-line
       comment */
    @import "a.styl" // import comment
    theme-color = #007 // var comment

    .box // rule comment
      align-items center /* inline multi */
      /* nested comment */
      width 100px
  expected: |
    // single line comment

    /* multi-line
       comment */

    @import "a.styl" // import comment

    theme-color = #007 // var comment

    .box // rule comment
      align-items center /* inline multi */
      /* nested comment */
      width 100px

- name: 去重
  code: |
    .box
      width 100px
      height 100px
      width 200px
      margin 0 auto
      margin 10px

      .card
        color red
        color blue
  expected: |
    .box
      height 100px
      width 200px
      margin 10px

      .card
        color blue

- name: 导入与选择器
  code: |
