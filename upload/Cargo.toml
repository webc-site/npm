[package]
name = "upload"
version = "0.1.4"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/upload"
description = "Minimal high-performance S3 client with content-addressable deduplication / 极简高性能内容寻址去重S3客户端"
keywords = ["s3", "upload", "deduplication", "content-addressable", "storage"]
categories = ["web-programming", "network-programming", "encoding", "cryptography", "filesystem"]
readme = "README.md"

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []
xhash = ["dep:xhash"]

[dependencies]
base64 = "0.22.1"
bytes = "1.12.0"
hex = "0.4.3"
hipstr = "0.8.0"
hmac = "0.13.0"
jiff = "0.2.31"
log = "0.4.33"
memchr = "2.8.2"
sha2 = "0.11.0"
thiserror = "2.0.18"
ts_ = { version = "0.1.4", path = "../ts_", features = ["sec"] }

[dependencies.ext_mime]
version = "0.1.3"
path = "../ext_mime"

[dependencies.reqwest]
version = "0.13.4"
default-features = false
features = ["rustls"]

[dependencies.tokio]
version = "1.52.3"
features = ["macros", "rt-multi-thread"]

[dependencies.xhash]
version = "0.1.38"
path = "../xhash"
features = ["xhash", "b64"]
optional = true

[dev-dependencies]
aok = "0.1.18"
dotenvy = "0.15.7"
log = "0.4.33"
log_init = "0.1.38"
static_init = "1.0.4"
