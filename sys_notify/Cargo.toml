[package]
name = "sys_notify"
version = "0.1.6"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/sys_notify"
description = "systemd ready notification library | systemd 就绪通知库"
keywords = ["systemd", "notify", "service", "linux", "daemon"]
categories = ["os", "os::linux-apis", "development-tools", "asynchronous", "concurrency"]

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[features]
default = []

[dev-dependencies]
aok = "0.1.18"
log = "0.4.33"
log_init = "0.1.38"
static_init = { version = "1.0.4", features = ["parking_lot"] }

[dev-dependencies.tokio]
version = "1.52.3"
features = ["macros", "rt", "rt-multi-thread", "time", "sync"]

[target.'cfg(target_os = "linux")'.dependencies]
sd-notify = "0.5.0"
