[package]
name = "rank"
version = "0.1.1"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/rank"
description = "Hacker News style ranking decay algorithm / 基于 Hacker News 公式的排序衰减算法"
keywords = ["rank", "ranking", "decay", "hacker-news", "algorithm"]
categories = ["algorithms", "data-structures", "mathematics", "web-programming", "science"]
readme = "README.md"

[features]
default = ["const"]
const = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
coarsetime = "0.1.37"
thiserror = "2.0.18"

[dev-dependencies]
aok = "0.1.18"
log = "0.4.29"
log_init = "0.1.34"
static_init = "1.0.4"