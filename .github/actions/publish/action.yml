name: 'NAPI Publish'
description: 'Publish N-API package to NPM'
inputs:
  working-directory:
    description: 'Working directory'
    required: true

runs:
  using: 'composite'
  steps:
    - name: 设置 Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        registry-url: "https://registry.npmjs.org/"

    - name: 安装 Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: 安装依赖
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install

    - name: 下载所有产物
      uses: actions/download-artifact@v4
      with:
        path: ${{ inputs.working-directory }}/artifacts
        merge-multiple: true

    - name: 移动产物
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        bunx napi create-npm-dirs
        bunx napi artifacts
        if [ -f ./ops/prepublish.js ]; then
          bun ./ops/prepublish.js
        fi
        echo "移动后检查产物："
        ls -R npm/

    - name: 发布 NPM 包
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun ../_/rs/github_action/publish.js
      env:
        GITHUB_TOKEN: ${{ github.token }}
