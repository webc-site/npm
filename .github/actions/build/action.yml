name: 'NAPI Build'
description: 'Build and test N-API native bindings'
inputs:
  working-directory:
    description: 'Working directory'
    required: true
  node_arch:
    description: 'Node architecture'
    required: true
  target:
    description: 'Rust target'
    required: true
  platform:
    description: 'Platform name'
    required: true
  extra:
    description: 'Extra build flags'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: 设置 Node
      uses: actions/setup-node@v6
      with:
        node-version: 24
        architecture: ${{ inputs.node_arch }}

    - name: 安装 Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    - name: 安装 Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        targets: ${{ inputs.target }}

    - name: Rust 缓存
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: "${{ inputs.working-directory }} -> target"

    - name: 安装 Zig
      if: ${{ contains(inputs.extra, '--cross-compile') }}
      uses: mlugg/setup-zig@v2

    - name: 安装 cargo-zigbuild
      if: ${{ contains(inputs.extra, '--cross-compile') }}
      shell: bash
      run: pipx install cargo-zigbuild

    - name: 安装依赖
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: bun install

    - name: 构建
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: PLATFORM=${{ inputs.platform }} bun ./dist.js --target ${{ inputs.target }} ${{ inputs.extra }}

    - name: 运行测试 (原生)
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        if bun run | grep -q "  test"; then
          binary_name=$(../_/rs/github_action/pkg_napi_binary_name.js)
          cp *.node "${binary_name}.node"
          bun run test
          rm -f "${binary_name}.node"
        fi

    - name: 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: bindings-${{ inputs.target }}
        path: ${{ inputs.working-directory }}/npm/**/*.node
        if-no-files-found: error
