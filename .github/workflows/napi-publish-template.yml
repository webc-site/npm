name: NAPI 发布模版

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: false

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            node_arch: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x64-musl
            extra: --cross-compile
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            platform: linux-arm64-musl
            extra: --cross-compile
            node_arch: arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc
            node_arch: x64
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: win32-arm64-msvc
            node_arch: arm64

    name: 稳定版 - ${{ matrix.settings.target }} - node
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          architecture: ${{ matrix.settings.node_arch }}

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: 安装 Zig
        if: ${{ contains(matrix.settings.extra, '--cross-compile') }}
        uses: goto-bus-stop/setup-zig@v2

      - name: 安装 cargo-zigbuild
        if: ${{ contains(matrix.settings.extra, '--cross-compile') }}
        run: pipx install cargo-zigbuild

      - name: 安装依赖
        shell: bash
        run: bun install

      - name: 构建
        shell: bash
        run: PLATFORM=${{ matrix.settings.platform }} bun ./dist.js --target ${{ matrix.settings.target }} ${{ matrix.settings.extra }}

      - name: 运行测试 (原生)
        if: ${{ !matrix.settings.test_docker }}
        shell: bash
        run: |
          if bun run | grep -q "  test"; then
            binary_name=$(../_/rs/github_action/pkg_napi_binary_name.js)
            cp *.node "${binary_name}.node"
            bun run test
            rm -f "${binary_name}.node"
          fi

      - name: 运行测试 (Docker)
        if: ${{ matrix.settings.test_docker }}
        run: |
          if bun run | grep -q "  test"; then
            binary_name=$(../_/rs/github_action/pkg_napi_binary_name.js)
            cp *.node "${binary_name}.node"
            docker run --rm --platform ${{ matrix.settings.test_platform }} \
              -v ${{ github.workspace }}:/workspace \
              -w /workspace/${{ inputs.working-directory }} \
              ${{ matrix.settings.test_docker }} \
              sh -c "bun install && bun run test"
            rm -f "${binary_name}.node"
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ inputs.working-directory }}/npm/**/*.node
          if-no-files-found: error

  publish:
    name: 发布
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.working-directory }}/artifacts
          merge-multiple: true

      - name: 移动产物
        run: |
          bunx napi create-npm-dirs
          bunx napi artifacts
          if [ -f ./ops/prepublish.js ]; then
            bun ./ops/prepublish.js
          fi
          echo "移动后检查产物："
          ls -R npm/

      - name: 发布 NPM 包
        run: |
          is_published() {
            local dir=$1
            local pkg_name=$(../_/rs/github_action/pkg_name.js "$(pwd)/${dir}")
            local pkg_version=$(../_/rs/github_action/pkg_version.js "$(pwd)/${dir}")
            if npm view "${pkg_name}@${pkg_version}" version --quiet | grep -q "${pkg_version}"; then
              return 0
            else
              return 1
            fi
          }

          publish_pkg() {
            local dir=$1
            local name=$(../_/rs/github_action/pkg_name.js "$(pwd)/${dir}")
            local version=$(../_/rs/github_action/pkg_version.js "$(pwd)/${dir}")
            if is_published "$dir"; then
              echo "包 ${name}@${version} 已经发布。跳过。"
              return 0
            fi

            echo "正在发布 $dir..."
            if npm publish "$dir" --provenance --access public; then
              return 0
            else
              local status=$?
              if is_published "$dir"; then
                echo "$dir 中的包在发布过程中已成功发布。跳过。"
                return 0
              fi
              return $status
            fi
          }

          publish_pkg "."

          for dir in npm/*; do
            if [ -d "$dir" ]; then
              publish_pkg "$dir"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
