name: NAPI Publish Template

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string
    secrets:
      NPM_TOKEN:
        required: false

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            node_arch: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x64-musl
            extra: --cross-compile
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            platform: linux-arm64-musl
            extra: --cross-compile
            node_arch: arm64
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32-x64-msvc
            node_arch: x64
          - host: windows-11-arm
            target: aarch64-pc-windows-msvc
            platform: win32-arm64-msvc
            node_arch: arm64

    name: stable - ${{ matrix.settings.target }} - node
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          architecture: ${{ matrix.settings.node_arch }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Install Zig
        if: ${{ contains(matrix.settings.extra, '--cross-compile') }}
        uses: goto-bus-stop/setup-zig@v2

      - name: Install cargo-zigbuild
        if: ${{ contains(matrix.settings.extra, '--cross-compile') }}
        run: pipx install cargo-zigbuild

      - name: Install dependencies
        shell: bash
        run: |
          if [[ "${{ matrix.settings.target }}" == "x86_64-apple-darwin" ]]; then
            npm install
          else
            bun install
          fi

      - name: Build
        shell: bash
        run: |
          if [ -f ./dist.js ]; then
            PLATFORM=${{ matrix.settings.platform }} bun ./dist.js --target ${{ matrix.settings.target }} ${{ matrix.settings.extra }}
          else
            npm run build -- --target ${{ matrix.settings.target }} --platform
          fi

      - name: Run Tests (Native)
        if: ${{ !matrix.settings.test_docker }}
        shell: bash
        run: |
          if npm run | grep -q "  test"; then
            binary_name=$(node -p "require('./package.json').napi.binaryName")
            cp *.node "${binary_name}.node"
            npm run test
            rm -f "${binary_name}.node"
          fi

      - name: Run Tests (Docker)
        if: ${{ matrix.settings.test_docker }}
        run: |
          if npm run | grep -q "  test"; then
            binary_name=$(node -p "require('./package.json').napi.binaryName")
            cp *.node "${binary_name}.node"
            docker run --rm --platform ${{ matrix.settings.test_platform }} \
              -v ${{ github.workspace }}:/workspace \
              -w /workspace/${{ inputs.working-directory }} \
              ${{ matrix.settings.test_docker }} \
              sh -c "bun install && bun run test"
            rm -f "${binary_name}.node"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: ${{ inputs.working-directory }}/npm/**/*.node
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.working-directory }}/artifacts
          merge-multiple: true

      - name: Move artifacts
        run: |
          bunx napi create-npm-dirs
          bunx napi artifacts
          if [ -f ./prepublish.js ]; then
            bun ./prepublish.js
          fi
          echo "Checking artifacts after move:"
          ls -R npm/

      - name: Publish NPM Package
        run: |
          is_published() {
            local dir=$1
            local pkg_name=$(node -p "require('$(pwd)/${dir}/package.json').name")
            local pkg_version=$(node -p "require('$(pwd)/${dir}/package.json').version")
            if npm view "${pkg_name}@${pkg_version}" version --quiet | grep -q "${pkg_version}"; then
              return 0
            else
              return 1
            fi
          }

          publish_pkg() {
            local dir=$1
            if is_published "$dir"; then
              echo "Package $(node -p "require('$(pwd)/${dir}/package.json').name")@$(node -p "require('$(pwd)/${dir}/package.json').version") already published. Skipping."
              return 0
            fi

            echo "Publishing $dir..."
            if npm publish "$dir" --provenance --access public; then
              return 0
            else
              local status=$?
              if is_published "$dir"; then
                echo "Package in $dir was published during the process. Skipping."
                return 0
              fi
              return $status
            fi
          }

          publish_pkg "."

          for dir in npm/*; do
            if [ -d "$dir" ]; then
              publish_pkg "$dir"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
