name: NAPI 基础发布模版

on:
  workflow_call:
    inputs:
      working-directory:
        required: true
        type: string


env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  OPENAI_LI: ${{ secrets.OPENAI_LI }}

jobs:
  publish:
    name: 发布
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - uses: actions/checkout@v4

      - name: 设置 Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: ${{ inputs.working-directory }}/artifacts
          merge-multiple: true

      - name: 移动产物
        run: |
          bunx napi create-npm-dirs
          bunx napi artifacts
          if [ -f ./ops/prepublish.js ]; then
            bun ./ops/prepublish.js
          fi
          echo "移动后检查产物："
          ls -R npm/

      - name: 发布 NPM 包
        run: |
          is_published() {
            local dir=$1
            local pkg_name=$(../_/rs/github_action/pkg_name.js "$(pwd)/${dir}")
            local pkg_version=$(../_/rs/github_action/pkg_version.js "$(pwd)/${dir}")
            if npm view "${pkg_name}@${pkg_version}" version --quiet | grep -q "${pkg_version}"; then
              return 0
            else
              return 1
            fi
          }

          publish_pkg() {
            local dir=$1
            local name=$(../_/rs/github_action/pkg_name.js "$(pwd)/${dir}")
            local version=$(../_/rs/github_action/pkg_version.js "$(pwd)/${dir}")
            if is_published "$dir"; then
              echo "包 ${name}@${version} 已经发布。跳过。"
              return 0
            fi

            echo "正在发布 $dir..."
            if npm publish "$dir" --provenance --access public; then
              return 0
            else
              local status=$?
              if is_published "$dir"; then
                echo "$dir 中的包在发布过程中已成功发布。跳过。"
                return 0
              fi
              return $status
            fi
          }

          publish_pkg "."

          for dir in npm/*; do
            if [ -d "$dir" ]; then
              publish_pkg "$dir"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ github.token }}
