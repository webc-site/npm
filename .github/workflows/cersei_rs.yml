name: 发布 cersei_rs

on:
  workflow_dispatch:
  push:
    tags:
      - "cersei_rs-v*"

permissions:
  contents: write
  id-token: write

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            node_arch: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x64-musl
            extra: --cross-compile
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            platform: linux-arm64-musl
            extra: --cross-compile
            node_arch: arm64

    name: ${{ matrix.settings.target }}
    runs-on: ${{ matrix.settings.host }}
    steps:
      - uses: actions/checkout@v6

      - name: 生成 OpenAI 配置文件
        env:
          OPENAI_LI: ${{ secrets.OPENAI_LI }}
        run: |
          mkdir -p conf
          echo "export default $OPENAI_LI;" > conf/OPENAI.js

      - name: 构建与测试
        uses: ./.github/actions/build
        with:
          working-directory: "cersei_rs"
          node_arch: ${{ matrix.settings.node_arch }}
          target: ${{ matrix.settings.target }}
          platform: ${{ matrix.settings.platform }}
          extra: ${{ matrix.settings.extra || '' }}

  publish:
    name: 发布
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: 发布到 NPM
        uses: ./.github/actions/publish
        with:
          working-directory: "cersei_rs"
