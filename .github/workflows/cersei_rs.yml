name: Publish cersei_rs

on:
  workflow_dispatch:
  push:
    tags:
      - "cersei_rs-v*"

permissions:
  contents: write
  id-token: write

env:
  DEBUG: napi:*
  MACOSX_DEPLOYMENT_TARGET: "11.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        settings:
          - host: macos-latest
            target: x86_64-apple-darwin
            platform: darwin-x64
            node_arch: x64
          - host: macos-latest
            target: aarch64-apple-darwin
            platform: darwin-arm64
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux-x64-gnu
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            platform: linux-arm64-gnu
            node_arch: arm64
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            platform: linux-x64-musl
            extra: --cross-compile
            node_arch: x64
          - host: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            platform: linux-arm64-musl
            extra: --cross-compile
            node_arch: arm64

    name: 稳定版 - ${{ matrix.settings.target }} - node
    runs-on: ${{ matrix.settings.host }}
    defaults:
      run:
        working-directory: cersei_rs
    steps:
      - uses: actions/checkout@v6

      - name: 生成 OpenAI 配置文件
        working-directory: .
        run: |
          mkdir -p conf
          echo "export default ${{ secrets.OPENAI_LI }};" > conf/OPENAI.js

      - name: 设置 Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          architecture: ${{ matrix.settings.node_arch }}

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}

      - name: Rust 缓存
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "cersei_rs -> target"

      - name: 安装 Zig
        if: ${{ contains(matrix.settings.extra, '--cross-compile') }}
        uses: mlugg/setup-zig@v2

      - name: 安装 cargo-zigbuild
        if: ${{ contains(matrix.settings.extra, '--cross-compile') }}
        run: pipx install cargo-zigbuild

      - name: 安装依赖
        shell: bash
        run: bun install

      - name: 构建
        shell: bash
        run: PLATFORM=${{ matrix.settings.platform }} bun ./dist.js --target ${{ matrix.settings.target }} ${{ matrix.settings.extra }}

      - name: 运行测试 (原生)
        shell: bash
        run: |
          if bun run | grep -q "  test"; then
            binary_name=$(../_/rs/github_action/pkg_napi_binary_name.js)
            cp *.node "${binary_name}.node"
            bun run test
            rm -f "${binary_name}.node"
          fi

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.settings.target }}
          path: cersei_rs/npm/**/*.node
          if-no-files-found: error

  publish:
    name: 发布
    runs-on: ubuntu-latest
    needs:
      - build
    permissions:
      contents: write
      id-token: write
    defaults:
      run:
        working-directory: cersei_rs
    steps:
      - uses: actions/checkout@v6

      - name: 设置 Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org/"

      - name: 安装 Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 安装依赖
        run: bun install

      - name: 下载所有产物
        uses: actions/download-artifact@v4
        with:
          path: cersei_rs/artifacts
          merge-multiple: true

      - name: 移动产物
        run: |
          bunx napi create-npm-dirs
          bunx napi artifacts
          if [ -f ./ops/prepublish.js ]; then
            bun ./ops/prepublish.js
          fi
          echo "移动后检查产物："
          ls -R npm/

      - name: 发布 NPM 包
        run: bun ../_/rs/github_action/publish.js
        env:
          GITHUB_TOKEN: ${{ github.token }}
