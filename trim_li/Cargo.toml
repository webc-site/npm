[package]
name = "trim_li"
version = "0.1.9"
edition = "2024"
license = "MulanPSL-2.0"
repository = "https://github.com/webc-site/npm.git"
homepage = "https://github.com/webc-site/npm/tree/main/trim_li"
description = "Zero-copy line iterator to trim right trailing spaces and filter empty lines / 过滤空行并修剪行尾空白的零拷贝迭代器"
keywords = ["trim", "line", "iterator", "zero-copy", "simd"]
categories = ["text-processing", "parsing", "algorithms", "data-structures", "no-std"]
readme = "README.md"

[features]
default = []

[package.metadata.docs.rs]
all-features = true
rustdoc-args = ["--cfg", "docsrs"]

[dependencies]
hipstr = "0.8.0"
memchr = "2.8.2"
roaring = "0.11.4"

[dev-dependencies]
aok = "0.1.18"
log = "0.4.32"
log_init = "0.1.38"
proptest = "1.11.0"
static_init = "1.0.4"